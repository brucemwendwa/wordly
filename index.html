<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordly Kids</title>

<style>
:root{
  --bg:#f0f9ff;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --primary:#6366f1;
  --accent:#fbbf24;
  --good:#34d399;
}

body.dark{
  --bg:#0b1220;
  --card:#111827;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --primary:#818cf8;
  --accent:#facc15;
}

body{
  margin:0;
  font-family: "Comic Sans MS", system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* APP WRAPPER */
.app{
  max-width:760px;
  margin:20px auto;
  padding:15px;
}

/* MAIN CARD */
.card{
  background:var(--card);
  border-radius:24px;
  padding:25px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.top h2{
  font-size:28px;
  margin:0;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-top:5px;
}

/* SEARCH */
.search{
  display:flex;
  gap:10px;
  margin:20px 0;
}

input{
  flex:1;
  padding:14px;
  font-size:18px;
  border-radius:14px;
  border:2px solid #e2e8f0;
  outline:none;
}

input:focus{
  border-color:var(--primary);
}

button{
  padding:14px 16px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* WORD CARD */
.word-card{
  margin-top:15px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(135deg,#ffffff,#f8fafc);
  border:2px solid #eef2ff;
  animation:fade .3s ease;
}

body.dark .word-card{
  background:#1f2937;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.word-title{
  font-size:26px;
  font-weight:bold;
}

.small{
  color:var(--muted);
}

/* TAGS */
.tag{
  display:inline-block;
  background:var(--accent);
  color:#111;
  padding:8px 12px;
  border-radius:999px;
  margin:5px;
  font-size:14px;
  cursor:pointer;
  font-weight:600;
}

/* SECTIONS */
h4{
  margin-top:20px;
  font-size:18px;
}

/* ICON BUTTON */
.icon-btn{
  background:transparent;
  font-size:22px;
  border:none;
  cursor:pointer;
  margin-left:8px;
}

/* SPINNER */
.spinner{
  border:4px solid #ddd;
  border-top:4px solid var(--primary);
  border-radius:50%;
  width:35px;
  height:35px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>
<div class="app">
<div class="card">

<div class="top">
<div>
<h2>📘 Wordly Kids Dictionary</h2>
<div class="subtitle">Learn new words every day ✨</div>
</div>
<button onclick="toggleDark()">🌙</button>
</div>

<form id="form" class="search">
<input id="input" placeholder="Type a word like 'happy' 😊" required>
<button>🔍</button>
</form>

<div id="result"></div>

<h4>⭐ Recent Words</h4>
<div id="history"></div>

<h4>🏆 Saved Words</h4>
<div id="favorites"></div>

</div>
</div>

<script>
const form=document.getElementById('form');
const input=document.getElementById('input');
const result=document.getElementById('result');
const historyDiv=document.getElementById('history');
const favDiv=document.getElementById('favorites');

let history=JSON.parse(localStorage.getItem('history'))||[];
let fav=JSON.parse(localStorage.getItem('fav'))||[];

form.addEventListener('submit',async e=>{
 e.preventDefault();
 const word=input.value.trim();
 if(!word) return;

 result.innerHTML='<div class="spinner"></div>';

 try{
  const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
  if(!res.ok) throw Error();
  const data=await res.json();
  localStorage.setItem('last',JSON.stringify(data[0]));
  show(data[0]);
  addHistory(word);
 }catch{
  result.innerHTML='😢 Word not found or offline';
 }
});

function show(entry){
 let html=`
 <div class="word-card">
 <div class="word-title">${entry.word}</div>
 <div class="small">${entry.phonetic||''}</div>
 `;

 const audio=entry.phonetics.find(p=>p.audio)?.audio;
 if(audio){
  html+=`<button class="icon-btn" onclick="new Audio('${audio}').play()">🔊</button>`;
 }

 entry.meanings.forEach(m=>{
  html+=`<p><b>📌 ${m.partOfSpeech}</b></p><ul>`;
  m.definitions.forEach(d=>{
   html+=`<li>${d.definition}</li>`;
  });
  html+='</ul>';
 });

 html+=`<button onclick="save('${entry.word}')">⭐ Save Word</button></div>`;
 result.innerHTML=html;
}

function addHistory(word){
 history=[word,...history.filter(w=>w!==word)].slice(0,6);
 localStorage.setItem('history',JSON.stringify(history));
 renderHistory();
}

function renderHistory(){
 historyDiv.innerHTML=history.map(w=>
 `<span class='tag' onclick="quick('${w}')">🔁 ${w}</span>`
 ).join('');
}

function save(word){
 if(!fav.includes(word)){
  fav.push(word);
  localStorage.setItem('fav',JSON.stringify(fav));
  renderFav();
 }
}

function renderFav(){
 favDiv.innerHTML=fav.map(w=>
 `<span class='tag' onclick="quick('${w}')">⭐ ${w}</span>`
 ).join('');
}

function quick(word){
 input.value=word;
 form.dispatchEvent(new Event('submit'));
}

function toggleDark(){
 document.body.classList.toggle('dark');
 localStorage.setItem('theme',document.body.classList.contains('dark'));
}

if(localStorage.getItem('theme')==='true'){
 document.body.classList.add('dark');
}

renderHistory();
renderFav();
</script>

</body>
</html>
